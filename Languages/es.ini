EnableGrooveStats=Establecer conexión con GrooveStats.
AutoDownloadUnlocks=Descarga automática de desbloqueos para eventos online.\n\nDescomprimir el desbloqueo puede causar que el juego se trabe.
SeparateUnlocksByPlayer=Desbloqueos descargados separados para cada perfil.

